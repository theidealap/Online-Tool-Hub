kind = "web"
previewPath = "/"
title = "Online Tools Hub"
version = "1.0.0"
id = "artifacts/online-tools"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22137

[services.development]
run = "pnpm --filter @workspace/online-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/online-tools", "run", "build" ]
serve = "static"
publicDir = "artifacts/online-tools/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22137"
BASE_PATH = "/"
